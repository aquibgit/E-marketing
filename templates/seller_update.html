{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Seller - E-MARKET</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #404040;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --primary: #6366f1;
            --secondary: #8b5cf6;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .update-section {
            padding: 4rem 0;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .update-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px var(--shadow-color);
            position: relative;
            transition: all 0.3s ease;
        }

        .update-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 25px 50px rgba(99, 102, 241, 0.2);
        }

        .update-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-color), #8b5cf6);
            border-radius: 20px 20px 0 0;
        }

        .update-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            position: relative;
        }

        .update-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.25);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .seller-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1rem;
            text-align: center;
            width: 100%;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .password-note {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .update-card {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            .update-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body class="dark-theme">
    {% include 'header.html' %}
<center>
    <section class="update-section">
        <div class="container">
            <div class="update-card">
                <span class="seller-badge">
                    <i class="fas fa-store me-2"></i>SELLER PROFILE UPDATE
                </span>
                <h1 class="update-title">
                    <i class="fas fa-user-edit me-3"></i>Update Seller
                </h1>

                <form class="form" action="seller_updates/{{ result.id }}" method="POST">
                    {% csrf_token %}
                    
                    <!-- Name -->
                    <div class="form-group">
                        <label for="name" class="form-label">
                            <i class="fas fa-user me-2"></i>Full Name
                        </label>
                        <input id="name" name="name" type="text" class="form-control" value="{{ result.name }}" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <input id="email" name="email" type="email" class="form-control" value="{{ result.email }}" required>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="phone" class="form-label">
                            <i class="fas fa-phone me-2"></i>Phone Number
                        </label>
                        <input id="phone" name="phone" type="text" class="form-control" value="{{ result.phone }}" required>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input id="password" name="password" type="text" class="form-control" value="{{ result.password }}" required>
                        <div class="password-note">
                            <i class="fas fa-info-circle me-1"></i>
                            Update your password for enhanced security
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>UPDATE SELLER PROFILE
                    </button>
                </form>
            </div>
        </div>
    </section>
</center>


    {% include 'footer.html' %}

    <!-- Bootstrap & JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
